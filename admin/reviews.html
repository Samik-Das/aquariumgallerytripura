<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://pkutovmcaumbbskoutsy.supabase.co">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
  <title>Customer Reviews - AquariumGalleryTripura Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#0891b2">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/logo.jpeg">
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          aqua: { 50:'#ecfeff',100:'#cffafe',200:'#a5f3fc',300:'#67e8f9',400:'#22d3ee',500:'#06b6d4',600:'#0891b2',700:'#0e7490',800:'#155e75',900:'#164e63' },
          golden: { 50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309' }
        },
        fontFamily: { heading: ['Poppins','sans-serif'], body: ['Inter','sans-serif'] }
      }}
    }
  </script>
</head>
<body>
  <div class="page-container">
    <div class="page-header">
      <h1><i class="fa-solid fa-star-half-stroke"></i> Customer Reviews</h1>
      <button onclick="openAddReviewModal()" class="btn btn-primary" style="margin-top:8px;">
        <i class="fa-solid fa-plus"></i> Add Review
      </button>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 stat-grid">
      <div class="stat-card gold">
        <div class="stat-icon"><i class="fa-solid fa-clock"></i></div>
        <div class="stat-value" id="stat-pending">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card aqua">
        <div class="stat-icon"><i class="fa-solid fa-circle-check"></i></div>
        <div class="stat-value" id="stat-approved">0</div>
        <div class="stat-label">Approved</div>
      </div>
      <div class="stat-card green">
        <div class="stat-icon"><i class="fa-solid fa-star"></i></div>
        <div class="stat-value" id="stat-avg">—</div>
        <div class="stat-label">Avg Rating</div>
      </div>
    </div>

    <!-- Pending Reviews -->
    <div class="card mb-6">
      <div class="card-header">
        <h2 class="card-title"><i class="fa-solid fa-hourglass-half text-yellow-500"></i> Pending Approval</h2>
        <span id="pending-count" class="badge badge-yellow">0</span>
      </div>
      <div id="pending-empty" style="display:none;text-align:center;padding:1.5rem;color:#94a3b8;font-size:0.85rem;">
        <i class="fa-solid fa-inbox" style="font-size:1.8rem;margin-bottom:8px;display:block;"></i>
        No pending reviews
      </div>
      <div id="pending-list"></div>
    </div>

    <!-- Approved Reviews -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title"><i class="fa-solid fa-circle-check text-green-500"></i> Approved Reviews</h2>
        <span id="approved-count" class="badge badge-green">0</span>
      </div>
      <div id="approved-empty" style="display:none;text-align:center;padding:1.5rem;color:#94a3b8;font-size:0.85rem;">
        <i class="fa-solid fa-star" style="font-size:1.8rem;margin-bottom:8px;display:block;"></i>
        No approved reviews yet
      </div>
      <div id="approved-list"></div>
    </div>

  </div>

  <!-- Add Review Modal -->
  <div id="add-review-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;padding:1rem;">
    <div style="background:white;border-radius:16px;padding:1.5rem;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.2);max-height:90vh;overflow-y:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;">
        <h3 class="font-heading font-bold text-aqua-700" style="margin:0;"><i class="fa-solid fa-plus"></i> Add Review</h3>
        <button onclick="closeAddReviewModal()" style="background:none;border:none;font-size:1.2rem;color:#94a3b8;cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <!-- Name -->
      <div class="mb-3">
        <label class="form-label">Customer Name</label>
        <input type="text" id="ar-name" class="form-input" placeholder="e.g. Rahul Das">
      </div>
      <!-- Product dropdown -->
      <div class="mb-3">
        <label class="form-label">Product Purchased</label>
        <select id="ar-product" class="form-select">
          <option value="">Select a product...</option>
        </select>
      </div>
      <!-- Stars -->
      <div class="mb-3">
        <label class="form-label">Rating</label>
        <div style="display:flex;gap:8px;font-size:1.6rem;">
          <span class="ar-star" data-v="1" onclick="setArStars(1)" style="cursor:pointer;color:#cbd5e1;">★</span>
          <span class="ar-star" data-v="2" onclick="setArStars(2)" style="cursor:pointer;color:#cbd5e1;">★</span>
          <span class="ar-star" data-v="3" onclick="setArStars(3)" style="cursor:pointer;color:#cbd5e1;">★</span>
          <span class="ar-star" data-v="4" onclick="setArStars(4)" style="cursor:pointer;color:#cbd5e1;">★</span>
          <span class="ar-star" data-v="5" onclick="setArStars(5)" style="cursor:pointer;color:#cbd5e1;">★</span>
        </div>
      </div>
      <!-- Body -->
      <div class="mb-4">
        <label class="form-label">Review Text <span style="color:#94a3b8;font-weight:400;">(optional)</span></label>
        <textarea id="ar-body" class="form-input" rows="3" placeholder="Write the review..."></textarea>
      </div>
      <div id="ar-error" style="display:none;color:#dc2626;font-size:0.78rem;margin-bottom:10px;"></div>
      <button id="ar-submit-btn" onclick="submitAdminReview()" class="btn btn-primary w-full">
        <i class="fa-solid fa-circle-check"></i> Save & Publish
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/components.js"></script>
  <script src="js/reviews.js"></script>
</body>
</html>
