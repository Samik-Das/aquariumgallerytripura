<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AquariumGalleryTripura Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#0891b2">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.jpeg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #164e63 0%, #0e7490 30%, #0891b2 60%, #155e75 100%);
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(251,191,36,0.15) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      border-radius: 50%;
    }
    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(6,182,212,0.2) 0%, transparent 70%);
      bottom: -100px;
      left: -100px;
      border-radius: 50%;
    }
    .login-container {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      width: 90%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
      position: relative;
      z-index: 10;
      animation: floatUp 0.6s ease;
    }
    @keyframes floatUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo .icon {
      width: 70px;
      height: 70px;
      border-radius: 20px;
      background: linear-gradient(135deg, #0891b2, #0e7490);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 1rem;
      box-shadow: 0 8px 24px rgba(8,145,178,0.3);
    }
    .login-logo h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #0e7490, #0891b2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .login-logo p {
      color: #64748b;
      font-size: 0.9rem;
      margin-top: 4px;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #155e75;
      margin-bottom: 6px;
      font-family: 'Poppins', sans-serif;
    }
    .form-group .input-wrapper {
      position: relative;
    }
    .form-group .input-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
      background: white;
    }
    .form-group input:focus {
      outline: none;
      border-color: #06b6d4;
      box-shadow: 0 0 0 3px rgba(6,182,212,0.15);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #0891b2, #0e7490);
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 16px rgba(8,145,178,0.3);
      margin-top: 0.5rem;
    }
    .login-btn:hover {
      background: linear-gradient(135deg, #0e7490, #155e75);
      box-shadow: 0 6px 20px rgba(8,145,178,0.4);
      transform: translateY(-1px);
    }
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .toggle-text {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #64748b;
    }
    .toggle-text a {
      color: #0891b2;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }
    .toggle-text a:hover { text-decoration: underline; }
    .error-msg {
      background: #fef2f2;
      color: #dc2626;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .bubbles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 1;
    }
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      animation: rise 10s infinite;
    }
    @keyframes rise {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Decorative Bubbles -->
  <div class="bubbles">
    <div class="bubble" style="width:80px;height:80px;left:10%;animation-delay:0s;animation-duration:8s;"></div>
    <div class="bubble" style="width:40px;height:40px;left:30%;animation-delay:2s;animation-duration:12s;"></div>
    <div class="bubble" style="width:60px;height:60px;left:50%;animation-delay:4s;animation-duration:10s;"></div>
    <div class="bubble" style="width:30px;height:30px;left:70%;animation-delay:1s;animation-duration:9s;"></div>
    <div class="bubble" style="width:50px;height:50px;left:85%;animation-delay:3s;animation-duration:11s;"></div>
    <div class="bubble" style="width:70px;height:70px;left:20%;animation-delay:5s;animation-duration:7s;"></div>
  </div>

  <div class="login-container">
    <div class="login-logo">
      <div class="icon">🐠</div>
      <h1>AquariumGalleryTripura</h1>
      <p id="login-subtitle">Sign in to your admin panel</p>
    </div>

    <div class="error-msg" id="error-msg">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span id="error-text"></span>
    </div>

    <form id="auth-form" onsubmit="handleAuth(event)">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="email" placeholder="admin@example.com" required>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" placeholder="Enter your password" required minlength="6">
        </div>
      </div>
      <button type="submit" class="login-btn" id="auth-btn">
        <i class="fa-solid fa-right-to-bracket"></i> Sign In
      </button>
    </form>


  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    // Check if already logged in
    (async () => {
      const { data: { session } } = await db.auth.getSession();
      if (session) window.location.href = 'index.html';
    })();

    function showError(msg) {
      const el = document.getElementById('error-msg');
      document.getElementById('error-text').textContent = msg;
      el.style.display = 'flex';
    }

    function hideError() {
      document.getElementById('error-msg').style.display = 'none';
    }

    async function handleAuth(e) {
      e.preventDefault();
      const btn = document.getElementById('auth-btn');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Please wait...';
      hideError();

      try {
        const { error } = await db.auth.signInWithPassword({ email, password });
        if (error) throw error;
        window.location.href = 'index.html';
      } catch (err) {
        showError(err.message || 'Authentication failed');
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
      }
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
