<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://pkutovmcaumbbskoutsy.supabase.co">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
  <title>Online Orders - AquariumGalleryTripura Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#0891b2">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/logo.jpeg">
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          aqua: { 50:'#ecfeff',100:'#cffafe',200:'#a5f3fc',300:'#67e8f9',400:'#22d3ee',500:'#06b6d4',600:'#0891b2',700:'#0e7490',800:'#155e75',900:'#164e63' },
          golden: { 50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309' }
        },
        fontFamily: { heading: ['Poppins','sans-serif'], body: ['Inter','sans-serif'] }
      }}
    }
  </script>
</head>
<body>
  <div class="page-container">
    <div class="page-header">
      <h1><i class="fa-solid fa-truck"></i> Online Orders</h1>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 stat-grid">
      <div class="stat-card gold">
        <div class="stat-icon"><i class="fa-solid fa-clock"></i></div>
        <div class="stat-value" id="stat-pending">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card aqua">
        <div class="stat-icon"><i class="fa-solid fa-check-circle"></i></div>
        <div class="stat-value" id="stat-confirmed">0</div>
        <div class="stat-label">In Progress</div>
      </div>
      <div class="stat-card green">
        <div class="stat-icon"><i class="fa-solid fa-truck"></i></div>
        <div class="stat-value" id="stat-delivered">0</div>
        <div class="stat-label">Delivered</div>
      </div>
      <div class="stat-card red">
        <div class="stat-icon"><i class="fa-solid fa-xmark"></i></div>
        <div class="stat-value" id="stat-declined">0</div>
        <div class="stat-label">Declined</div>
      </div>
      <div class="stat-card red">
        <div class="stat-icon"><i class="fa-solid fa-rotate-left"></i></div>
        <div class="stat-value" id="stat-cancelled">0</div>
        <div class="stat-label">Cancelled</div>
      </div>
    </div>

    <!-- Filter -->
    <div class="flex gap-3 flex-wrap mb-4">
      <select id="filter-status" class="form-select" style="width:auto;min-width:140px;" onchange="renderOrders()">
        <option value="active">Active Orders</option>
        <option value="pending">Pending Only</option>
        <option value="confirmed">In Progress</option>
        <option value="delivered">Delivered</option>
        <option value="declined">Declined</option>
        <option value="cancelled">Cancelled</option>
        <option value="all">All Orders</option>
      </select>
      <div class="search-box" style="flex:1;min-width:0;">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="search-input" placeholder="Search by name or phone..." oninput="renderOrders()">
      </div>
    </div>

    <!-- Active Orders (cards) -->
    <div id="orders-cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
      <div class="fish-loader" id="orders-loader" style="grid-column:1/-1;">
        <div class="fish-swim"><span class="fish">🐠</span><span class="fish">🐟</span><span class="fish">🐡</span><div class="bubbles"><span></span><span></span><span></span></div></div>
        <div class="fish-loader-text">Loading orders<span class="dot-anim"></span></div>
      </div>
    </div>
    <div id="orders-empty" class="empty-state card" style="display:none;">
      <i class="fa-solid fa-truck"></i>
      <h3>No orders found</h3>
      <p>Online orders will appear here when customers place them</p>
    </div>

    <!-- Order History Table -->
    <div class="card mt-6">
      <div class="card-header">
        <h2><i class="fa-solid fa-clock-rotate-left"></i> Order History</h2>
        <span id="history-count" class="badge badge-aqua">0</span>
      </div>
      <div class="table-wrapper" id="history-table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Customer</th>
              <th>Phone</th>
              <th>Items</th>
              <th>Total</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="history-body"><tr class="fish-loader-row"><td colspan="6"><div class="fish-loader"><div class="fish-swim"><span class="fish">🐠</span><span class="fish">🐟</span><span class="fish">🐡</span><div class="bubbles"><span></span><span></span><span></span></div></div><div class="fish-loader-text">Loading order history<span class="dot-anim"></span></div></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Order Detail Modal -->
  <div id="order-modal" class="modal-overlay" style="display:none;">
    <div class="modal" style="max-width:500px;">
      <h3><i class="fa-solid fa-receipt" style="color:var(--gold-500);"></i> Order Details</h3>
      <div id="order-modal-body"></div>
      <div class="modal-actions" id="order-modal-actions"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/orders.js"></script>
</body>
</html>
