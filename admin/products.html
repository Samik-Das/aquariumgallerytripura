<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://pkutovmcaumbbskoutsy.supabase.co">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
  <title>Product Entry - AquariumGalleryTripura Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#0891b2">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/logo.jpeg">
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          aqua: { 50:'#ecfeff',100:'#cffafe',200:'#a5f3fc',300:'#67e8f9',400:'#22d3ee',500:'#06b6d4',600:'#0891b2',700:'#0e7490',800:'#155e75',900:'#164e63' },
          golden: { 50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309' }
        },
        fontFamily: { heading: ['Poppins','sans-serif'], body: ['Inter','sans-serif'] }
      }}
    }
  </script>
</head>
<body>
  <div class="page-container">
    <div class="page-header">
      <h1><i class="fa-solid fa-box"></i> Product Entry</h1>
    </div>

    <!-- Entry Form -->
    <div class="card mb-4">
      <div class="card-header">
        <h2><i class="fa-solid fa-plus-circle"></i> Add Product</h2>
      </div>

      <form id="product-form" onsubmit="saveProduct(event)">
        <!-- Name + Category in same row -->
        <div class="grid grid-cols-2 gap-3 mb-3">
          <div class="form-group">
            <label class="form-label">Product Name</label>
            <div style="position:relative;">
              <select id="product-name-select" class="form-select" onchange="onProductSelect()">
                <option value="">-- Select Product --</option>
              </select>
            </div>
            <button type="button" onclick="showAddNameModal()" class="mt-1 text-xs font-semibold text-aqua-600 hover:text-aqua-800 flex items-center gap-1">
              <i class="fa-solid fa-plus"></i> ADD NAME
            </button>
          </div>

          <div class="form-group">
            <label class="form-label">Category</label>
            <div style="position:relative;">
              <select id="category-select" class="form-select">
                <option value="">-- Select Category --</option>
              </select>
            </div>
            <button type="button" onclick="showAddCategoryModal()" class="mt-1 text-xs font-semibold text-aqua-600 hover:text-aqua-800 flex items-center gap-1">
              <i class="fa-solid fa-plus"></i> ADD CATEGORY
            </button>
          </div>
        </div>

        <!-- Image -->
        <div class="form-group mb-3">
          <label class="form-label">Product Image</label>
          <label class="btn btn-outline btn-sm w-full justify-center cursor-pointer">
            <i class="fa-solid fa-camera"></i> Upload Photo
            <input type="file" accept="image/*" id="product-image" style="display:none;" onchange="previewProductImage(event)">
          </label>
          <img id="image-preview" src="" alt="" style="display:none;max-height:80px;margin-top:8px;border-radius:8px;">
        </div>

        <!-- BP + SP + Quantity in same row -->
        <div class="grid grid-cols-3 gap-3">
          <div class="form-group">
            <label class="form-label">Buying Price</label>
            <input type="number" id="buying-price" class="form-input" placeholder="₹ 0" step="0.01" min="0" required>
          </div>
          <div class="form-group">
            <label class="form-label">Selling Price</label>
            <input type="number" id="selling-price" class="form-input" placeholder="₹ 0" step="0.01" min="0" required>
          </div>
          <div class="form-group">
            <label class="form-label">Quantity</label>
            <input type="number" id="quantity" class="form-input" placeholder="0" min="1" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Description <span style="color:#94a3b8;font-weight:400;">(optional)</span></label>
          <textarea id="product-description" class="form-input" placeholder="Short description of the product..." rows="2" style="resize:vertical;"></textarea>
        </div>

        <div class="flex gap-3 mt-4">
          <button type="submit" class="btn btn-primary" id="save-btn">
            <i class="fa-solid fa-floppy-disk"></i> Save Product
          </button>
          <button type="reset" class="btn btn-outline" onclick="resetForm()">
            <i class="fa-solid fa-rotate-left"></i> Reset
          </button>
        </div>
      </form>
    </div>

    <!-- Entry History -->
    <div class="card">
      <div class="card-header">
        <h2><i class="fa-solid fa-clock-rotate-left"></i> Entry History</h2>
        <span id="entry-count" class="badge badge-aqua">0 entries</span>
      </div>
      <div class="table-wrapper" id="history-table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Product</th>
              <th>Category</th>
              <th>Buy Price</th>
              <th>Sell Price</th>
              <th>Qty</th>
            </tr>
          </thead>
          <tbody id="history-body"><tr class="fish-loader-row"><td colspan="6"><div class="fish-loader"><div class="fish-swim"><span class="fish">🐠</span><span class="fish">🐟</span><span class="fish">🐡</span><div class="bubbles"><span></span><span></span><span></span></div></div><div class="fish-loader-text">Loading history<span class="dot-anim"></span></div></div></td></tr></tbody>
        </table>
      </div>
      <div id="history-empty" class="empty-state" style="display:none;">
        <i class="fa-solid fa-clock-rotate-left"></i>
        <h3>No entries yet</h3>
        <p>Product entries will appear here</p>
      </div>
    </div>
  </div>

  <!-- Add Name Modal -->
  <div id="name-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h3><i class="fa-solid fa-plus" style="color:var(--gold-500);"></i> Add New Product Name</h3>
      <div class="form-group">
        <label class="form-label">Product Name</label>
        <input type="text" id="new-name-input" class="form-input" placeholder="Enter product name">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="document.getElementById('name-modal').style.display='none'">Cancel</button>
        <button class="btn btn-primary" onclick="addNewName()"><i class="fa-solid fa-check"></i> Add</button>
      </div>
    </div>
  </div>

  <!-- Add Category Modal -->
  <div id="category-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h3><i class="fa-solid fa-plus" style="color:var(--gold-500);"></i> Add New Category</h3>
      <div class="form-group">
        <label class="form-label">Category Name</label>
        <input type="text" id="new-category-input" class="form-input" placeholder="Enter category name">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="document.getElementById('category-modal').style.display='none'">Cancel</button>
        <button class="btn btn-primary" onclick="addNewCategory()"><i class="fa-solid fa-check"></i> Add</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
