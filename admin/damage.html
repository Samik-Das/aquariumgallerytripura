<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Damage Entry - AquariumGalleryTripura Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#0891b2">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/logo.jpeg">
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          aqua: { 50:'#ecfeff',100:'#cffafe',200:'#a5f3fc',300:'#67e8f9',400:'#22d3ee',500:'#06b6d4',600:'#0891b2',700:'#0e7490',800:'#155e75',900:'#164e63' },
          golden: { 50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309' }
        },
        fontFamily: { heading: ['Poppins','sans-serif'], body: ['Inter','sans-serif'] }
      }}
    }
  </script>
</head>
<body>
  <div class="page-container">
    <div class="page-header">
      <h1><i class="fa-solid fa-triangle-exclamation"></i> Damage Entry</h1>
    </div>

    <!-- Damage Form -->
    <div class="card mb-4">
      <div class="card-header">
        <h2><i class="fa-solid fa-file-circle-exclamation"></i> Record Damage</h2>
      </div>

      <form id="damage-form" onsubmit="saveDamage(event)">
        <!-- Product + Category in one row -->
        <div class="grid grid-cols-2 gap-3 mb-2">
          <div class="form-group mb-0">
            <label class="form-label">Product</label>
            <select id="damage-product" class="form-select" onchange="onDamageProductChange()">
              <option value="">-- Select --</option>
            </select>
          </div>
          <div class="form-group mb-0">
            <label class="form-label">Category</label>
            <input type="text" id="damage-category" class="form-input" readonly style="background:#f8fafc;">
          </div>
        </div>
        <!-- Stock + Qty + BP in one row -->
        <div class="grid grid-cols-3 gap-3 mb-2">
          <div class="form-group mb-0">
            <label class="form-label">Stock</label>
            <input type="text" id="damage-stock" class="form-input" readonly style="background:#f8fafc;">
          </div>
          <div class="form-group mb-0">
            <label class="form-label">Qty Damaged</label>
            <input type="number" id="damage-qty" class="form-input" placeholder="0" min="1" oninput="calculateDamageCost()">
          </div>
          <div class="form-group mb-0">
            <label class="form-label">BP/Item</label>
            <input type="text" id="damage-bp" class="form-input" readonly style="background:#f8fafc;">
          </div>
        </div>
        <!-- Total Loss -->
        <div class="form-group mb-2">
          <label class="form-label">Total Loss (BP × Qty)</label>
          <input type="text" id="damage-total-bp" class="form-input font-bold text-red-600" readonly style="background:#fef2f2;">
        </div>

        <!-- Auto Fix SP -->
        <div class="mt-2 p-3 bg-amber-50 rounded-xl border border-amber-200">
          <label class="form-checkbox">
            <input type="checkbox" id="auto-fix-sp" onchange="calculateNewSP()">
            <div>
              <span class="font-semibold text-amber-800">Auto Fix Selling Price</span>
              <p class="text-xs text-amber-600 mt-1">
                Distributes the buying cost of damaged items across remaining stock so you don't take a loss.
              </p>
            </div>
          </label>
          <div id="sp-preview" class="mt-2 p-2 bg-white rounded-lg" style="display:none;">
            <div class="grid grid-cols-2 gap-3 text-sm">
              <div>
                <span class="text-gray-500">Current SP:</span>
                <span class="font-bold" id="preview-old-sp">₹0</span>
              </div>
              <div>
                <span class="text-gray-500">New SP:</span>
                <span class="font-bold text-green-600" id="preview-new-sp">₹0</span>
              </div>
            </div>
          </div>
        </div>

        <div class="flex gap-3 mt-4">
          <button type="submit" class="btn btn-primary" id="save-damage-btn">
            <i class="fa-solid fa-floppy-disk"></i> Save Damage
          </button>
          <button type="reset" class="btn btn-outline" onclick="resetDamageForm()">
            <i class="fa-solid fa-rotate-left"></i> Reset
          </button>
        </div>
      </form>
    </div>

    <!-- Damage History -->
    <div class="card">
      <div class="card-header">
        <h2><i class="fa-solid fa-clock-rotate-left"></i> Damage History</h2>
        <span id="damage-count" class="badge badge-red">0 records</span>
      </div>
      <div class="table-wrapper" id="damage-table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Product</th>
              <th>Category</th>
              <th>Qty</th>
              <th>BP/Item</th>
              <th>Total Loss</th>
              <th>SP Fixed</th>
              <th>New SP</th>
            </tr>
          </thead>
          <tbody id="damage-body"></tbody>
        </table>
      </div>
      <div id="damage-empty" class="empty-state" style="display:none;">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <h3>No damage records</h3>
        <p>Damage entries will appear here</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/damage.js"></script>
</body>
</html>
