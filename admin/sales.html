<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Entry - AquariumGalleryTripura Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          aqua: { 50:'#ecfeff',100:'#cffafe',200:'#a5f3fc',300:'#67e8f9',400:'#22d3ee',500:'#06b6d4',600:'#0891b2',700:'#0e7490',800:'#155e75',900:'#164e63' },
          golden: { 50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309' }
        },
        fontFamily: { heading: ['Poppins','sans-serif'], body: ['Inter','sans-serif'] }
      }}
    }
  </script>
</head>
<body>
  <div class="page-container">
    <div class="page-header">
      <h1><i class="fa-solid fa-cash-register"></i> Sales Entry</h1>
    </div>

    <!-- Customer Info -->
    <div class="card mb-6">
      <div class="card-header">
        <h2><i class="fa-solid fa-user"></i> Customer Info</h2>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" id="customer-phone" class="form-input" placeholder="Enter phone number" oninput="lookupCustomer()">
        </div>
        <div class="form-group">
          <label class="form-label">Customer Name</label>
          <input type="text" id="customer-name" class="form-input" placeholder="Customer name">
          <span id="returning-badge" class="badge badge-green mt-1" style="display:none;">
            <i class="fa-solid fa-rotate"></i> Returning Customer
          </span>
        </div>
      </div>
    </div>

    <!-- Sale Items -->
    <div class="card mb-6">
      <div class="card-header">
        <h2><i class="fa-solid fa-cart-shopping"></i> Sale Items</h2>
        <button onclick="addSaleItem()" class="btn btn-gold btn-sm"><i class="fa-solid fa-plus"></i> Add More Item</button>
      </div>

      <div id="sale-items-container">
        <!-- Sale items rendered here -->
      </div>

      <!-- Total -->
      <div class="mt-4 pt-4 border-t-2 border-aqua-50 flex items-center justify-between">
        <div>
          <span class="text-lg font-heading font-bold text-aqua-800">Total Amount:</span>
          <span class="text-2xl font-heading font-extrabold text-green-600 ml-2" id="sale-total">₹0.00</span>
        </div>
        <button onclick="saveSale()" class="btn btn-primary" id="save-sale-btn">
          <i class="fa-solid fa-floppy-disk"></i> Save Sale
        </button>
      </div>
    </div>

    <!-- Sales History -->
    <div class="card">
      <div class="card-header">
        <h2><i class="fa-solid fa-clock-rotate-left"></i> Sales History</h2>
        <span id="sales-count" class="badge badge-aqua">0 sales</span>
      </div>
      <div class="table-wrapper" id="sales-table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Customer</th>
              <th>Phone</th>
              <th>Items</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody id="sales-body"></tbody>
        </table>
      </div>
      <div id="sales-empty" class="empty-state" style="display:none;">
        <i class="fa-solid fa-cash-register"></i>
        <h3>No sales yet</h3>
        <p>Sales records will appear here</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/sales.js"></script>
</body>
</html>
