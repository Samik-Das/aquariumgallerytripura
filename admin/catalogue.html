<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://pkutovmcaumbbskoutsy.supabase.co">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
  <title>Catalogue - AquariumGalleryTripura Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#0891b2">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/logo.jpeg">
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          aqua: { 50:'#ecfeff',100:'#cffafe',200:'#a5f3fc',300:'#67e8f9',400:'#22d3ee',500:'#06b6d4',600:'#0891b2',700:'#0e7490',800:'#155e75',900:'#164e63' },
          golden: { 50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309' }
        },
        fontFamily: { heading: ['Poppins','sans-serif'], body: ['Inter','sans-serif'] }
      }}
    }
  </script>
</head>
<body>
  <div class="page-container">
    <div class="page-header">
      <h1><i class="fa-solid fa-store"></i> Catalogue</h1>
      <div class="flex gap-2 items-center flex-wrap" style="width:100%;">
        <div class="search-box" style="flex:1;min-width:0;">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="search-input" placeholder="Search..." oninput="filterProducts()">
        </div>
        <select id="filter-category" class="form-select" style="width:auto;min-width:100px;flex-shrink:0;" onchange="filterProducts()">
          <option value="">All Categories</option>
        </select>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4 stat-grid">
      <div class="stat-card aqua">
        <div class="stat-icon"><i class="fa-solid fa-box"></i></div>
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total Products</div>
      </div>
      <div class="stat-card green">
        <div class="stat-icon"><i class="fa-solid fa-boxes-stacked"></i></div>
        <div class="stat-value" id="stat-stock">0</div>
        <div class="stat-label">Total Items in Stock</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-icon"><i class="fa-solid fa-indian-rupee-sign"></i></div>
        <div class="stat-value" id="stat-value">₹0</div>
        <div class="stat-label">Stock Value (SP)</div>
      </div>
      <div class="stat-card red">
        <div class="stat-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
        <div class="stat-value" id="stat-low">0</div>
        <div class="stat-label">Low Stock Items</div>
      </div>
    </div>

    <!-- Product Grid -->
    <div id="product-grid" class="product-grid">
      <div class="fish-loader" id="catalogue-loader" style="grid-column:1/-1;">
        <div class="fish-swim"><span class="fish">🐠</span><span class="fish">🐟</span><span class="fish">🐡</span><div class="bubbles"><span></span><span></span><span></span></div></div>
        <div class="fish-loader-text">Loading products<span class="dot-anim"></span></div>
      </div>
    </div>

    <!-- Load More Button -->
    <div id="load-more-wrapper" style="display:none;text-align:center;margin-top:1.5rem;">
      <button onclick="loadMoreProducts()" class="btn btn-primary" id="load-more-btn">
        <i class="fa-solid fa-angles-down"></i> Load More Products
      </button>
      <p id="load-more-count" style="margin-top:6px;color:#94a3b8;font-size:0.8rem;"></p>
    </div>

    <div id="products-empty" class="empty-state card" style="display:none;">
      <i class="fa-solid fa-store"></i>
      <h3>No products in catalogue</h3>
      <p>Add products from the Product Entry page</p>
    </div>
  </div>

  <!-- Edit Product Modal -->
  <div id="edit-modal" class="modal-overlay" style="display:none;">
    <div class="modal" style="max-width:600px;">
      <h3><i class="fa-solid fa-pen" style="color:var(--gold-500);"></i> Edit Product</h3>
      <div class="grid grid-cols-3 gap-3 mb-3">
        <div class="form-group mb-0">
          <label class="form-label">Selling Price</label>
          <input type="number" id="edit-sp" class="form-input" step="0.01" min="0">
        </div>
        <div class="form-group mb-0">
          <label class="form-label">Buying Price</label>
          <input type="number" id="edit-bp" class="form-input" step="0.01" min="0">
        </div>
        <div class="form-group mb-0">
          <label class="form-label">Quantity</label>
          <input type="number" id="edit-qty" class="form-input" min="0">
        </div>
      </div>
      <div class="form-group">
        <label class="btn btn-outline btn-sm w-full justify-center cursor-pointer">
          <i class="fa-solid fa-camera"></i> Change Image
          <input type="file" accept="image/*" id="edit-image" style="display:none;">
        </label>
      </div>
      <div class="form-group">
        <label class="form-label">Description <span style="color:#94a3b8;font-weight:400;">(optional)</span></label>
        <textarea id="edit-description" class="form-input" placeholder="Short description..." rows="2" style="resize:vertical;"></textarea>
      </div>
      <input type="hidden" id="edit-product-id">
      <div class="modal-actions mt-4">
        <button class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveEditProduct()"><i class="fa-solid fa-check"></i> Save Changes</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/catalogue.js"></script>
</body>
</html>
