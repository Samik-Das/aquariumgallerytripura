<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - AquariumGalleryTripura</title>
  <link rel="preconnect" href="https://pkutovmcaumbbskoutsy.supabase.co">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="Browse our wide collection of aquarium fish, accessories, and supplies.">
  <meta name="theme-color" content="#0891b2">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/logo.jpeg">
</head>
<body>

  <!-- Header -->
  <header class="store-header">
    <div class="store-header-inner">
      <a href="index.html" class="store-logo">
        <img src="icons/logo.jpeg" alt="AGT" class="store-logo-icon">
        <span class="store-logo-text">AquariumGalleryTripura</span>
      </a>
      <a href="index.html?points=open" class="header-points-btn"><i class="fa-solid fa-star"></i> My Points</a>
      <button class="store-nav-toggle" onclick="document.querySelector('.store-nav').classList.toggle('open')">
        <i class="fa-solid fa-bars"></i>
      </button>
      <nav class="store-nav">
        <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
        <a href="products.html" class="active"><i class="fa-solid fa-bag-shopping"></i> Products</a>
        <a href="cart.html" class="cart-nav-link"><i class="fa-solid fa-cart-shopping"></i> Cart <span class="cart-badge nav-cart-badge" style="display:none;">0</span></a>
        <a href="index.html?points=open"><i class="fa-solid fa-star" style="color:#f59e0b;"></i> My Points</a>
        <a href="contact.html"><i class="fa-solid fa-phone"></i> Contact Us</a>
      </nav>
    </div>
  </header>

  <!-- Search & Filters (sticky below header) -->
  <div class="products-toolbar">
    <div class="products-toolbar-inner">
      <div class="toolbar-search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="search-input" placeholder="Search products..." oninput="filterProducts()">
      </div>
      <div class="toolbar-filters">
        <select id="category-filter" onchange="filterProducts()">
          <option value="">All Categories</option>
        </select>
        <select id="sort-filter" onchange="filterProducts()">
          <option value="">Sort by</option>
          <option value="low">Price: Low to High</option>
          <option value="high">Price: High to Low</option>
          <option value="name">Name: A-Z</option>
        </select>
      </div>
    </div>
    <div class="toolbar-count">
      <span id="product-count" style="font-weight:700;color:#0891b2;">0</span> products
    </div>
  </div>

  <section class="section" style="padding-top:1rem;">

    <!-- Product Grid -->
    <div class="product-grid-store" id="product-grid">
      <div class="fish-loader" id="products-loader" style="grid-column:1/-1;">
        <div class="fish-swim"><span class="fish">🐠</span><span class="fish">🐟</span><span class="fish">🐡</span><div class="bubbles"><span></span><span></span><span></span></div></div>
        <div class="fish-loader-text">Fetching amazing products<span class="dot-anim"></span></div>
      </div>
    </div>

    <!-- Load More Button -->
    <div id="load-more-wrapper" style="display:none;text-align:center;margin-top:1.5rem;">
      <button onclick="loadMore()" id="load-more-btn"
        style="padding:12px 36px;background:linear-gradient(135deg,#06b6d4,#0891b2);color:white;border:none;border-radius:12px;font-size:0.95rem;font-weight:700;font-family:'Poppins',sans-serif;cursor:pointer;box-shadow:0 4px 16px rgba(6,182,212,0.25);transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;"
        onmousedown="this.style.transform='scale(0.97)'" onmouseup="this.style.transform='scale(1)'">
        <i class="fa-solid fa-angles-down"></i> Load More Products
      </button>
      <p id="load-more-count" style="margin-top:8px;color:#94a3b8;font-size:0.8rem;"></p>
    </div>

    <!-- Empty State -->
    <div id="empty-state" style="display:none;text-align:center;padding:4rem 2rem;">
      <i class="fa-solid fa-fish" style="font-size:4rem;color:#a5f3fc;margin-bottom:1rem;display:block;"></i>
      <h3 style="font-family:'Poppins',sans-serif;font-size:1.2rem;color:#64748b;margin-bottom:0.5rem;">No products found</h3>
      <p style="color:#94a3b8;">Try a different search or category</p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="store-footer">
    <p>&copy; 2022 <a href="index.html">AquariumGalleryTripura</a>. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    let allProducts = [];
    let currentFiltered = [];
    let displayedCount = 0;
    let categoryOrder = {};
    const PAGE_SIZE = 20;

    (async () => {
      await Promise.all([loadCategories(), loadProducts()]);
      filterProducts();
      applyUrlFilter();
      highlightProduct();
    })();

    async function loadCategories() {
      const { data } = await db.from('categories').select('name').order('created_at');
      const select = document.getElementById('category-filter');
      (data || []).forEach((c, i) => {
        categoryOrder[c.name] = i;
        select.innerHTML += `<option value="${c.name}">${c.name}</option>`;
      });
    }

    async function loadProducts() {
      const { data } = await db.from('products').select('*').order('name');
      allProducts = data || [];
    }

    function applyUrlFilter() {
      const params = new URLSearchParams(window.location.search);
      const cat = params.get('category');
      if (cat) {
        document.getElementById('category-filter').value = cat;
        filterProducts();
      }
    }

    function highlightProduct() {
      const params = new URLSearchParams(window.location.search);
      const pid = params.get('highlight');
      if (!pid) return;
      // Clear category filter so product is visible regardless of category
      document.getElementById('category-filter').value = '';
      filterProducts();
      // Load all products so the highlighted one is visible
      const idx = currentFiltered.findIndex(p => String(p.id) === String(pid));
      if (idx >= 0 && idx >= displayedCount) {
        while (displayedCount <= idx) loadMore();
      }
      setTimeout(() => {
        const card = document.querySelector(`[data-product-id="${pid}"]`);
        if (card) {
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
          card.style.outline = '3px solid #0891b2';
          card.style.outlineOffset = '3px';
          card.style.borderRadius = '14px';
          setTimeout(() => {
            card.style.transition = 'outline 1.5s ease';
            card.style.outline = '3px solid transparent';
          }, 2500);
        }
      }, 300);
    }

    function filterProducts() {
      const search = document.getElementById('search-input').value.toLowerCase().trim();
      const category = document.getElementById('category-filter').value;
      const sort = document.getElementById('sort-filter').value;

      currentFiltered = allProducts.filter(p => {
        const matchSearch = !search || p.name.toLowerCase().includes(search) || p.category.toLowerCase().includes(search);
        const matchCat = !category || p.category === category;
        return matchSearch && matchCat;
      });

      if (sort === 'low') currentFiltered.sort((a, b) => a.selling_price - b.selling_price);
      else if (sort === 'high') currentFiltered.sort((a, b) => b.selling_price - a.selling_price);
      else if (sort === 'name') currentFiltered.sort((a, b) => a.name.localeCompare(b.name));

      // Sort: in-stock grouped by category order first, then out-of-stock grouped by category order
      currentFiltered.sort((a, b) => {
        const aOut = a.quantity > 0 ? 0 : 1;
        const bOut = b.quantity > 0 ? 0 : 1;
        if (aOut !== bOut) return aOut - bOut;
        const aCat = categoryOrder[a.category] ?? 999;
        const bCat = categoryOrder[b.category] ?? 999;
        return aCat - bCat;
      });

      displayedCount = 0;
      document.getElementById('product-grid').innerHTML = '';
      document.getElementById('product-count').textContent = currentFiltered.length;
      loadMore();
    }

    function loadMore() {
      const grid = document.getElementById('product-grid');
      const empty = document.getElementById('empty-state');
      const wrapper = document.getElementById('load-more-wrapper');
      const countLabel = document.getElementById('load-more-count');

      if (currentFiltered.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        wrapper.style.display = 'none';
        return;
      }

      empty.style.display = 'none';

      const nextBatch = currentFiltered.slice(displayedCount, displayedCount + PAGE_SIZE);
      grid.insertAdjacentHTML('beforeend', nextBatch.map(p => renderProductCard(p)).join(''));
      displayedCount += nextBatch.length;

      const remaining = currentFiltered.length - displayedCount;
      if (remaining > 0) {
        wrapper.style.display = 'block';
        countLabel.textContent = `Showing ${displayedCount} of ${currentFiltered.length} products • ${remaining} more`;
      } else {
        wrapper.style.display = 'none';
      }
    }

    // ===== Cart Utilities =====
    function getCart() {
      try { return JSON.parse(localStorage.getItem('agt_cart') || '[]'); }
      catch { return []; }
    }
    function saveCart(cart) { localStorage.setItem('agt_cart', JSON.stringify(cart)); }
    function addToCart(productId) {
      const p = allProducts.find(x => String(x.id) === String(productId));
      if (!p || p.quantity <= 0) return;
      const cart = getCart();
      const existing = cart.find(c => c.id === p.id);
      if (existing) {
        if (existing.qty >= p.quantity) { showCartToast('Max available quantity reached'); return; }
        existing.qty++;
      } else {
        cart.push({ id: p.id, name: p.name, price: p.selling_price, image: p.image_url || '', qty: 1, maxQty: p.quantity });
      }
      saveCart(cart);
      updateCartBadge();
      showCartToast(`${p.name} added to cart`);
    }
    function updateCartBadge() {
      const count = getCart().reduce((s, c) => s + c.qty, 0);
      document.querySelectorAll('.cart-badge').forEach(b => {
        b.textContent = count;
        b.style.display = count > 0 ? 'flex' : 'none';
      });
    }
    function showCartToast(msg) {
      let t = document.getElementById('cart-toast');
      if (!t) { t = document.createElement('div'); t.id = 'cart-toast'; document.body.appendChild(t); }
      t.textContent = msg;
      t.className = 'cart-toast show';
      setTimeout(() => t.className = 'cart-toast', 2000);
    }

    // Init badge on load
    document.addEventListener('DOMContentLoaded', updateCartBadge);

    function renderProductCard(p) {
      const isOut = p.quantity <= 0;
      const isLow = p.quantity > 0 && p.quantity < 5;
      let badge = '';
      if (isOut) badge = `<div class="prod-badge" style="background:#fef2f2;color:#dc2626;">Out of Stock</div>`;
      else if (isLow) badge = `<div class="prod-badge" style="background:#fef2f2;color:#dc2626;">Only ${p.quantity} left!</div>`;

      let stockPill;
      if (isOut) {
        stockPill = `<span class="stock-pill stock-out"><i class="fa-solid fa-xmark"></i></span>`;
      } else if (isLow) {
        stockPill = `<span class="stock-pill stock-low">${p.quantity}</span>`;
      } else {
        stockPill = `<span class="stock-pill stock-ok">${p.quantity}</span>`;
      }

      const cartBtn = isOut ? '' : `
        <button class="add-cart-btn" onclick="event.stopPropagation();addToCart('${p.id}')" title="Add to Cart">
          <i class="fa-solid fa-cart-plus"></i>
        </button>`;

      return `
        <div class="store-product-card${isOut ? ' out-of-stock' : ''}" data-product-id="${p.id}">
          <div class="prod-img">
            ${p.image_url
              ? `<img src="${p.image_url}" alt="${p.name}" loading="lazy" decoding="async">`
              : `<i class="fa-solid fa-fish" style="font-size:2rem;color:#a5f3fc;"></i>`
            }
            ${badge}
          </div>
          <div class="prod-body">
            <div class="prod-name">${p.name}</div>
            ${p.description ? `<div class="prod-desc">${p.description}</div>` : ''}
            <div class="prod-bottom">
              <span class="prod-price">₹${Number(p.selling_price).toLocaleString('en-IN')}</span>
              ${stockPill}
            </div>
            ${cartBtn}
          </div>
        </div>
      `;
    }
  </script>

  <!-- Floating Points Button -->
  <a href="index.html?points=open" class="points-fab" style="text-decoration:none;">
    <i class="fa-solid fa-star"></i>
    <span>My Points</span>
  </a>

  <!-- Mobile Bottom Nav -->
  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
      <a href="products.html" class="active"><i class="fa-solid fa-bag-shopping"></i><span>Products</span></a>
      <a href="cart.html" class="cart-bottom-link"><i class="fa-solid fa-cart-shopping"></i><span>Cart</span><span class="cart-badge bottom-cart-badge" style="display:none;">0</span></a>
      <a href="contact.html"><i class="fa-solid fa-phone"></i><span>Contact</span></a>
    </div>
  </nav>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
